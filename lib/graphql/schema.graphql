"""
Indicates exactly one field must be supplied and this field must not be `null`.
"""
directive @oneOf on INPUT_OBJECT

"""Exposes a URL that specifies the behavior of this scalar."""
directive @specifiedBy(
  """The URL that specifies the behavior of this scalar."""
  url: String!
) on SCALAR

type LoginResponse {
  ccUserId: Float
  connectySession: String
  message: String!
  token: String
  user: UserType
}

input LoginUserDto {
  email: String!
  password: String!
}

type Mutation {
  login(body: LoginUserDto!): LoginResponse!
  login_By_token(body: LoginUserDto!): LoginResponse!
  register(body: UserRegisterInput!): UserResgisterResponse!
}

type Query {
  hello: String!
}

input UserRegisterInput {
  email: String!
  firstName: String!
  lastName: String!
  password: String!
}

type UserResgisterResponse {
  message: String!
  user: UserType!
}

type UserType {
  email: String!
  firstName: String!
  id: String!
  lastName: String!
}

